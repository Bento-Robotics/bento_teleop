/**:
  ros__parameters:

    # Joystick mappings
    axis_linear: 1
    axis_angular: 2
    axis_throttle: 3

    button_enable: 2
    button_disable: 3

    button_flippers_front_up: 9
    button_flippers_front_down: 8
    button_flippers_back_up: 11
    button_flippers_back_down: 10

    # Publisher/service params
    publish_rate: 0.1
    robot_namespace: '/bento'
    enable_service_name: '/enable'
    maximum_rpm_topic: '/maximum/rpms'
    maximum_vel_topic: '/maximum/velocity'

    # Maximum defaults (in case the robot doesn't publish it's values)
    maximum_rpm_default: [0.0, 0.0]
    maximum_vel_default.linear: [10.0, 0.0, 0.0]
    maximum_vel_default.angular: [10.0, 0.0, 0.0]
